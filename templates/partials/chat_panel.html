{# 壁打ち chat panel (本願 chat / 検索 chat 共用)。
   親テンプレート (case.html) で `case_id`, `chat_topic`, `chat_panel_id` を渡す。
   chat_topic: "hongan" | "search" | "free"
   chat_panel_id: HTML id 用の suffix (例: "hongan", "search")
#}
<div class="chat-root" id="chat-root-{{ chat_panel_id }}"
     data-case-id="{{ case_id }}"
     data-topic="{{ chat_topic }}"
     data-panel-id="{{ chat_panel_id }}"
     style="display:flex; gap:0.6rem; min-height:520px; height:62vh;">

  <!-- サイドバー: スレッド一覧 -->
  <aside style="width:230px; flex-shrink:0; display:flex; flex-direction:column; background:#0f172a; border:1px solid var(--border); border-radius:8px; padding:0.5rem;">
    <button class="btn btn-primary" style="font-size:0.82rem; padding:0.35rem 0.6rem; margin-bottom:0.5rem;"
            onclick="chatCreateThread('{{ chat_panel_id }}')">+ 新スレッド</button>
    <div id="chat-thread-list-{{ chat_panel_id }}" style="flex:1; overflow:auto; display:flex; flex-direction:column; gap:0.25rem;">
      <p style="font-size:0.78rem; color:var(--text2); padding:0.4rem;">読込中...</p>
    </div>
  </aside>

  <!-- メイン: メッセージ + 入力 -->
  <main style="flex:1; display:flex; flex-direction:column; background:#0f172a; border:1px solid var(--border); border-radius:8px; padding:0.6rem;">
    <div id="chat-thread-header-{{ chat_panel_id }}" style="font-size:0.85rem; color:#cbd5e1; margin-bottom:0.5rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); min-height:1.4em;">
      <span style="color:#64748b;">スレッド未選択</span>
    </div>
    <div id="chat-messages-{{ chat_panel_id }}" style="flex:1; overflow:auto; padding:0.4rem; display:flex; flex-direction:column; gap:0.6rem; font-size:0.86rem; line-height:1.55;">
      <p style="color:var(--text2); text-align:center; margin-top:2rem;">
        左側「+ 新スレッド」で対話を始めてください。<br>
        既存スレッドはサイドバーから選択。
      </p>
    </div>
    <div id="chat-status-{{ chat_panel_id }}" style="font-size:0.78rem; color:var(--text2); min-height:1.2em; margin:0.3rem 0;"></div>
    <div style="display:flex; gap:0.4rem; align-items:flex-end;">
      <textarea id="chat-input-{{ chat_panel_id }}" rows="3"
                placeholder="質問・相談を入力 (Ctrl+Enter で送信)"
                style="flex:1; padding:0.4rem 0.6rem; background:#1e293b; color:#e2e8f0; border:1px solid var(--border); border-radius:6px; font-family:inherit; font-size:0.86rem; resize:vertical;"
                onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){event.preventDefault(); chatSendMessage('{{ chat_panel_id }}');}"
                disabled></textarea>
      <button class="btn btn-primary" id="chat-send-{{ chat_panel_id }}"
              style="padding:0.5rem 0.9rem;"
              onclick="chatSendMessage('{{ chat_panel_id }}')" disabled>送信</button>
    </div>
  </main>
</div>
